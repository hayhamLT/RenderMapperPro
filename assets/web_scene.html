<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>html, body { margin: 0; background: #000; overflow: hidden; }</style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js",
      "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.tsl.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let renderer, scene, camera;
const materialsByName = {};
const camerasByName = {};

window.__ready = false;
window.__error = '';

const api = {
  async init(w, h) {
    renderer = new THREE.WebGPURenderer({ antialias: true });
    renderer.setPixelRatio(1);
    renderer.setSize(w, h);
    renderer.setClearColor(0x000000, 1);
    document.body.appendChild(renderer.domElement);
    await renderer.init();
    return (renderer.backend && renderer.backend.isWebGPUBackend) ? 'webgpu' : 'webgl2';
  },

  async loadGLB(b64, isBinary) {
    // Parse from bytes (passed in) rather than fetching a file:// URL, which a
    // file:// page can't do. .glb is binary; .gltf is JSON text.
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const loader = new GLTFLoader();
    const gltf = await new Promise((resolve, reject) => {
      if (isBinary) loader.parse(bytes.buffer, '', resolve, reject);
      else loader.parse(new TextDecoder().decode(bytes), '', resolve, reject);
    });
    scene = gltf.scene;
    scene.traverse((o) => {
      if (o.isMesh && o.material) {
        for (const m of (Array.isArray(o.material) ? o.material : [o.material])) {
          if (m.name) materialsByName[m.name] = m;
        }
      }
      if (o.isCamera && o.name) camerasByName[o.name] = o;
    });
    (gltf.cameras || []).forEach((c) => { if (c.name) camerasByName[c.name] = c; });
    return { materials: Object.keys(materialsByName), cameras: Object.keys(camerasByName) };
  },

  useCamera(name) {
    const cw = renderer ? renderer.domElement.width : 640;
    const ch = renderer ? renderer.domElement.height : 360;
    if (name && camerasByName[name]) {
      camera = camerasByName[name];
    } else {
      // No camera named → frame the whole scene with a default one.
      const box = new THREE.Box3().setFromObject(scene);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 0.001);
      camera = new THREE.PerspectiveCamera(45, cw / ch, maxDim / 1000, maxDim * 100);
      camera.position.copy(center).add(new THREE.Vector3(0, 0, maxDim * 2.2));
      camera.lookAt(center);
    }
    if (camera.isPerspectiveCamera) {
      camera.aspect = cw / ch;
      camera.updateProjectionMatrix();
    }
  },

  async setEmissive(materialName, dataUrl) {
    const m = materialsByName[materialName];
    if (!m) return false;
    const img = new Image();
    await new Promise((res, rej) => {
      img.onload = res; img.onerror = () => rej(new Error('image decode failed')); img.src = dataUrl;
    });
    let tex = m.__videoTex;
    if (!tex) { tex = new THREE.Texture(); tex.colorSpace = THREE.SRGBColorSpace; m.__videoTex = tex; }
    tex.image = img; tex.needsUpdate = true;
    // Full-bright video: emissive map at white, no tone mapping (matches the
    // "emission full-bright" mapping the Blender/Redshift paths use).
    m.emissiveMap = tex;
    if (m.emissive && m.emissive.setRGB) m.emissive.setRGB(1, 1, 1);
    if ('emissiveIntensity' in m) m.emissiveIntensity = 1.0;
    m.toneMapped = false;
    m.needsUpdate = true;
    return true;
  },

  async render() {
    await renderer.renderAsync(scene, camera);
  },
};

window.api = api;
window.__ready = true;
</script>
</body>
</html>
