name: Build

# Builds the standalone app for macOS (Apple Silicon) and Windows.
# - Pushing a version tag (v1.2.3) builds them AND publishes a GitHub Release.
# - Pushing to main, or running manually, builds them as downloadable workflow
#   artifacts (no release) so you can test.
# macOS is Apple-Silicon-only: the deprecated macos-13 Intel runner build was
# dropped (it rarely finished). A universal2 build is the path back to Intel.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub Release for the current app_version.py (creates the v<version> tag)"
        type: boolean
        default: false

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15   # a stuck runner fails fast instead of hanging ~6h
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Qt offscreen system libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install dev tools
        # All gating tools pinned (PySide6 to the build version so mypy checks the
        # same Qt stubs) — an unrelated ruff/mypy/pytest release must never break
        # main; bump these deliberately.
        run: python -m pip install --upgrade pip "pytest==9.1.0" "pytest-timeout==2.4.0" "ruff==0.15.17" "mypy==2.1.0" PySide6==6.11.1
      - name: Ruff (whole repo)
        run: ruff check .
      - name: Mypy (file set owned by pyproject [tool.mypy] files — whole repo)
        run: mypy
      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        # test_smoke_ui runs in its own process via the ui-smoke job — running it
        # in the same pytest process as the other UI tests deadlocks Qt's global
        # state (each passes in isolation).
        # --timeout turns a hung test into a fast failure (a stack dump) rather
        # than a stalled runner.
        run: pytest -q --ignore=tests/test_smoke_ui.py --timeout=180

  # Construct the whole Qt window headlessly and exercise key wiring, so UI
  # regressions are caught even though app_qt.py isn't fully unit-tested.
  # Gates the builds/Release (proven stable since v1.4.17).
  ui-smoke:
    name: UI Smoke (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 10   # this step has hung on a stuck runner; fail fast + rerun
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Qt offscreen system libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install deps
        # Pinned to match the lint-test job (PySide6 to the build version) so the
        # smoke gate can't drift on an unrelated dependency release.
        run: python -m pip install --upgrade pip "pytest==9.1.0" "pytest-timeout==2.4.0" PySide6==6.11.1
      - name: Headless UI smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        # --timeout dumps a stack and fails if the construct/first-run wiring ever
        # deadlocks, so the runner never hangs indefinitely on it.
        run: pytest -q tests/test_smoke_ui.py --timeout=120

  # Render one real frame through the headless three.js backend, end to end. The
  # three.js graph is vendored (no CDN), so this runs fully offline — it guards
  # the web path, which lint/ui-smoke don't touch, against silent breakage.
  web-smoke:
    name: Web render smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install deps
        # Playwright pinned to the build version; core is PySide6-free so the
        # smoke needs only the browser driver + pytest.
        run: python -m pip install --upgrade pip "pytest==9.1.0" "pytest-timeout==2.4.0" "playwright==1.60.0"
      - name: Install Chromium
        run: python -m playwright install chromium --with-deps
      - name: Render one frame (offline, vendored three.js)
        run: pytest -q tests/test_web_render_smoke.py --timeout=180

  # Dependency vulnerability scan (OSV / PyPI advisories) over the shipped +
  # build pins. Advisory only: it does NOT gate the build/Release (continue-on-
  # error), so a fresh upstream CVE can't block a release on its own — Dependabot
  # opens the actual fix PRs. Findings show in this job's log/summary. Flip
  # continue-on-error to false (and add to branch protection) to make it blocking.
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: pip-audit (runtime + build deps)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt -r requirements-build.txt --desc

  # Fast, reliable runners — these gate the Release.
  build:
    name: Build (${{ matrix.label }})
    needs: [lint-test, ui-smoke, web-smoke]
    if: github.event_name != 'pull_request'   # PRs run gates only, not full builds
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45   # PyInstaller + Playwright bundling; fail before the 6h cap
    permissions:
      contents: read
      id-token: write       # for signed build-provenance attestation
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            label: macOS-arm64
          - os: windows-latest  # x64
            label: Windows-x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip -r requirements-build.txt
      - name: Fetch bundled ffmpeg / ffprobe
        run: python tools/fetch_ffmpeg.py
      # No auth token is baked into builds: the repo is public, so the in-app
      # updater reads Releases over the anonymous GitHub API. (A token in a
      # shipped binary would be extractable, so we deliberately ship none.)
      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean BlenderVideoMapper.spec
      # ── macOS code-signing + notarization ──────────────────────────────────
      # Requires four repository secrets (Settings → Secrets → Actions):
      #   MACOS_CERTIFICATE      base64-encoded Developer ID Application .p12
      #                          export:  base64 -i cert.p12 | pbcopy
      #   MACOS_CERTIFICATE_PWD  password you chose when exporting the .p12
      #   MACOS_CERTIFICATE_NAME "Developer ID Application: Your Name (TEAMID)"
      #   NOTARIZATION_APPLE_ID  your Apple ID email
      #   NOTARIZATION_TEAM_ID   10-char Team ID from developer.apple.com
      #   NOTARIZATION_PWD       app-specific password from appleid.apple.com
      # All steps are no-ops (with a warning) when the secrets are absent so the
      # build still produces a working (unsigned) app during development.
      - name: Import signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "::warning::MACOS_CERTIFICATE not set — app will be unsigned"
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PWD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH" 2>/dev/null || true
      - name: Sign app (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then exit 0; fi
          APP="dist/Render Mapper Pro.app"
          # Sign nested dylibs/so files individually first (--deep misses some)
          find "$APP/Contents" -type f \( -name "*.dylib" -o -name "*.so" \) \
            -print0 | xargs -0 -I{} codesign --force --sign "$MACOS_CERTIFICATE_NAME" \
              --options runtime \
              --entitlements installer/entitlements.plist "{}" 2>/dev/null || true
          # Sign any nested .framework bundles
          find "$APP/Contents/Frameworks" -type d -name "*.framework" 2>/dev/null \
            -print0 | xargs -0 -I{} codesign --force --sign "$MACOS_CERTIFICATE_NAME" \
              --options runtime \
              --entitlements installer/entitlements.plist "{}" 2>/dev/null || true
          # Sign the outer .app (--deep catches anything the above loops missed)
          codesign --force --deep --verify --verbose \
            --sign "$MACOS_CERTIFICATE_NAME" \
            --options runtime \
            --entitlements installer/entitlements.plist \
            "$APP"
          codesign --verify --deep --strict "$APP"
          echo "Code-signing complete"
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          bash installer/make_dmg.sh "RenderMapperPro-${{ matrix.label }}.dmg"
      - name: Notarize and staple (macOS)
        if: runner.os == 'macOS'
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
          NOTARIZATION_PWD: ${{ secrets.NOTARIZATION_PWD }}
        run: |
          if [ -z "$NOTARIZATION_APPLE_ID" ]; then
            echo "::warning::NOTARIZATION_APPLE_ID not set — skipping notarization"
            ditto -c -k --sequesterRsrc --keepParent \
              "dist/Render Mapper Pro.app" \
              "RenderMapperPro-${{ matrix.label }}.zip"
            exit 0
          fi
          # Submit the DMG; Apple validates every binary inside it. Parse the
          # result ourselves: notarytool --wait can exit 0 on an "Invalid"
          # verdict, and a bare stapler failure hides the actual reason.
          xcrun notarytool submit "RenderMapperPro-${{ matrix.label }}.dmg" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --password "$NOTARIZATION_PWD" \
            --wait --output-format json | tee notarize.json
          status=$(python3 -c "import json;print(json.load(open('notarize.json'))['status'])")
          sub_id=$(python3 -c "import json;print(json.load(open('notarize.json'))['id'])")
          if [ "$status" != "Accepted" ]; then
            echo "::error::Notarization verdict: $status — fetching Apple's log"
            xcrun notarytool log "$sub_id" \
              --apple-id "$NOTARIZATION_APPLE_ID" \
              --team-id "$NOTARIZATION_TEAM_ID" \
              --password "$NOTARIZATION_PWD" || true
            exit 1
          fi
          # Staple the ticket to the DMG and to the .app (so the zip is clean too)
          xcrun stapler staple "RenderMapperPro-${{ matrix.label }}.dmg"
          xcrun stapler staple "dist/Render Mapper Pro.app"
          # Build the zip from the now-stapled .app
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Render Mapper Pro.app" \
            "RenderMapperPro-${{ matrix.label }}.zip"
          echo "Notarization and stapling complete"
      # ── Windows code-signing (Authenticode) ────────────────────────────────
      # Optional, mirroring the macOS pattern: set two repository secrets and
      # the exe + installer get signed; leave them unset and the build stays
      # unsigned (SmartScreen "More info → Run anyway").
      #   WINDOWS_CERTIFICATE      base64-encoded code-signing .pfx
      #                            export:  base64 -w0 cert.pfx
      #   WINDOWS_CERTIFICATE_PWD  the .pfx password
      # (Azure Trusted Signing is the modern cert-less alternative — swap this
      # step for azure/trusted-signing-action if you go that route.)
      - name: Sign app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Host "::warning::WINDOWS_CERTIFICATE not set - Windows build will be unsigned"
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "signing-cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          & $signtool.FullName sign /f $pfx /p $env:WINDOWS_CERTIFICATE_PWD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            "dist/Render Mapper Pro/Render Mapper Pro.exe"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "App executable signed"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Render Mapper Pro" `
            -DestinationPath "RenderMapperPro-${{ matrix.label }}.zip"
          choco install innosetup --no-progress -y
          $ver = (Select-String -Path app_version.py -Pattern '__version__ = "([^"]+)"').Matches[0].Groups[1].Value
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" installer\windows.iss
          Copy-Item "installer\Output\RenderMapperPro-Windows-x64-Setup.exe" .
      - name: Sign installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) { exit 0 }
          $pfx = Join-Path $env:RUNNER_TEMP "signing-cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          & $signtool.FullName sign /f $pfx /p $env:WINDOWS_CERTIFICATE_PWD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            "RenderMapperPro-Windows-x64-Setup.exe"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Installer signed"
      # Signed SLSA build-provenance for each shipped artifact (verifiable with
      # `gh attestation verify <file> --repo <owner>/<repo>`). Skipped on PRs
      # (this whole job is push/tag-only).
      - name: Attest build provenance (macOS)
        if: runner.os == 'macOS'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            RenderMapperPro-${{ matrix.label }}.zip
            RenderMapperPro-${{ matrix.label }}.dmg
      - name: Attest build provenance (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            RenderMapperPro-${{ matrix.label }}.zip
            RenderMapperPro-Windows-x64-Setup.exe
      - uses: actions/upload-artifact@v7
        with:
          name: RenderMapperPro-${{ matrix.label }}
          path: |
            RenderMapperPro-${{ matrix.label }}.zip
            RenderMapperPro-${{ matrix.label }}.dmg
            RenderMapperPro-Windows-x64-Setup.exe
          if-no-files-found: ignore

  # Publish the Release as soon as the macOS-arm64 + Windows builds are ready.
  # Triggered by a v* tag push, OR manually via "Run workflow" with
  # publish_release=true (which cuts the release for the current app_version.py
  # and creates the v<version> tag itself — used when a tag push isn't available).
  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Determine release tag
        id: tag
        shell: bash
        # On a tag push the tag IS the ref; on a manual dispatch derive v<version>
        # from app_version.py (the single source of truth) so the two can't drift.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' app_version.py)
            [ -n "$ver" ] || { echo "could not read __version__ from app_version.py"; exit 1; }
            echo "name=v${ver}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Generate SHA-256 checksums
        run: |
          : > SHA256SUMS.txt
          while IFS= read -r -d '' f; do
            ( cd "$(dirname "$f")" && sha256sum "$(basename "$f")" ) >> "$GITHUB_WORKSPACE/SHA256SUMS.txt"
          done < <(find artifacts -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.exe' \) -print0)
          cat SHA256SUMS.txt
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.exe
            SHA256SUMS.txt
          generate_release_notes: true
          body: |
            Standalone builds of **Render Mapper Pro**.

            | Platform | Installer (recommended) | Portable |
            |----------|-------------------------|----------|
            | Windows (x64) | `RenderMapperPro-Windows-x64-Setup.exe` | `RenderMapperPro-Windows-x64.zip` |
            | macOS (Apple Silicon) | `RenderMapperPro-macOS-arm64.dmg` | `RenderMapperPro-macOS-arm64.zip` |

            **Windows:** run the **Setup.exe** (installs to Program Files + Start-Menu shortcut). Windows SmartScreen may prompt on first run.
            **macOS:** open the **.dmg** and drag the app to Applications. The app is signed and notarized — it opens normally on first launch. Apple Silicon only.

            **Verify your download:** `SHA256SUMS.txt` lists the checksum of every artifact (`shasum -a 256 -c SHA256SUMS.txt`). Each binary also carries signed build provenance — verify with `gh attestation verify <file> --repo ${{ github.repository }}`.
