[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 120
target-version = "py312"
# deadline/ is excluded deliberately: the plugin runs inside Deadline's own
# (old) Python host on the farm, so py312 modernisation could break it there.
extend-exclude = ["patch.py", "vendor", "dist", "build", ".venv", "deadline"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501", "B008"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
exclude = ["build/", "dist/", "vendor/"]
