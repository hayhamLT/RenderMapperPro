name: Build

# Builds the standalone app for macOS (Apple Silicon + Intel) and Windows.
# - Pushing a version tag (v1.2.3) builds all three AND publishes a GitHub
#   Release with the zips attached for friends to download.
# - Pushing to main, or running manually, builds them as downloadable
#   workflow artifacts (no release) so you can test.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            label: macOS-arm64
          - os: macos-13        # Intel
            label: macOS-intel
          - os: windows-latest  # x64
            label: Windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip -r requirements-build.txt

      - name: Fetch bundled ffmpeg / ffprobe
        run: python tools/fetch_ffmpeg.py

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean BlenderVideoMapper.spec

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Render Mapper Pro.app" \
            "RenderMapperPro-${{ matrix.label }}.zip"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Render Mapper Pro" `
            -DestinationPath "RenderMapperPro-${{ matrix.label }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: RenderMapperPro-${{ matrix.label }}
          path: RenderMapperPro-${{ matrix.label }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          body: |
            Standalone builds of **Render Mapper Pro**.

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `RenderMapperPro-macOS-arm64.zip` |
            | macOS (Intel) | `RenderMapperPro-macOS-intel.zip` |
            | Windows (x64) | `RenderMapperPro-Windows-x64.zip` |

            **macOS:** unzip, then right-click the app → **Open** → **Open** (first launch only, since it isn't notarized).
            **Windows:** unzip the folder, run **Render Mapper Pro.exe**. If SmartScreen warns, click **More info → Run anyway**.
