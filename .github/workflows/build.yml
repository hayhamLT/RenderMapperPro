name: Build

# Builds the standalone app for macOS (Apple Silicon + Intel) and Windows.
# - Pushing a version tag (v1.2.3) builds them AND publishes a GitHub Release.
#   The Release publishes as soon as the fast builds (arm64 + Windows) are ready;
#   the slower macOS-Intel build (often stuck in GitHub's runner queue) attaches
#   its zip to the same Release whenever it finishes, so it never blocks.
# - Pushing to main, or running manually, builds them as downloadable workflow
#   artifacts (no release) so you can test.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Qt offscreen system libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install dev tools
        # PySide6 pinned to the build version so mypy checks against the same Qt
        # stubs we develop against (the UI layer is now type-checked).
        run: python -m pip install --upgrade pip pytest pytest-timeout ruff mypy PySide6==6.11.1
      - name: Ruff (whole repo)
        run: ruff check .
      - name: Mypy (core + workers + UI layer)
        run: mypy core workers.py app_qt.py panels.py icons.py ui_widgets.py media.py theme.py dialogs.py app_window
      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        # test_smoke_ui runs in its own process via the ui-smoke job — running it
        # in the same pytest process as the other UI tests deadlocks Qt's global
        # state (each passes in isolation).
        run: pytest -q --ignore=tests/test_smoke_ui.py

  # Construct the whole Qt window headlessly and exercise key wiring, so UI
  # regressions are caught even though app_qt.py isn't fully unit-tested.
  # Gates the builds/Release (proven stable since v1.4.17).
  ui-smoke:
    name: UI Smoke (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Qt offscreen system libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install deps
        run: python -m pip install --upgrade pip pytest pytest-timeout PySide6
      - name: Headless UI smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q tests/test_smoke_ui.py

  # Fast, reliable runners — these gate the Release.
  build:
    name: Build (${{ matrix.label }})
    needs: [lint-test, ui-smoke]
    if: github.event_name != 'pull_request'   # PRs run gates only, not full builds
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            label: macOS-arm64
          - os: windows-latest  # x64
            label: Windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip -r requirements-build.txt
      - name: Fetch bundled ffmpeg / ffprobe
        run: python tools/fetch_ffmpeg.py
      - name: Inject auto-update token
        shell: bash
        run: |
          if [ -n "${{ secrets.RMP_UPDATE_TOKEN }}" ]; then
            printf '%s' "${{ secrets.RMP_UPDATE_TOKEN }}" > assets/update_token.txt
            echo "Update token injected ($(wc -c < assets/update_token.txt) bytes)."
          else
            echo "No RMP_UPDATE_TOKEN secret — building without auto-update."
          fi
      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean BlenderVideoMapper.spec
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Render Mapper Pro.app" \
            "RenderMapperPro-${{ matrix.label }}.zip"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Render Mapper Pro" `
            -DestinationPath "RenderMapperPro-${{ matrix.label }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: RenderMapperPro-${{ matrix.label }}
          path: RenderMapperPro-${{ matrix.label }}.zip
          if-no-files-found: error

  # macOS-Intel (macos-13) runners are scarce and often queue for a long time,
  # so this is decoupled — it never blocks the Release.
  build-intel:
    name: Build (macOS-intel)
    needs: [lint-test, ui-smoke]
    if: github.event_name != 'pull_request'   # PRs run gates only, not full builds
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip -r requirements-build.txt
      - name: Fetch bundled ffmpeg / ffprobe
        run: python tools/fetch_ffmpeg.py
      - name: Inject auto-update token
        shell: bash
        run: |
          if [ -n "${{ secrets.RMP_UPDATE_TOKEN }}" ]; then
            printf '%s' "${{ secrets.RMP_UPDATE_TOKEN }}" > assets/update_token.txt
            echo "Update token injected ($(wc -c < assets/update_token.txt) bytes)."
          else
            echo "No RMP_UPDATE_TOKEN secret — building without auto-update."
          fi
      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean BlenderVideoMapper.spec
      - name: Package
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Render Mapper Pro.app" \
            "RenderMapperPro-macOS-intel.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: RenderMapperPro-macOS-intel
          path: RenderMapperPro-macOS-intel.zip
          if-no-files-found: error

  # Publish the Release as soon as arm64 + Windows are ready.
  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          body: |
            Standalone builds of **Render Mapper Pro**.

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `RenderMapperPro-macOS-arm64.zip` |
            | macOS (Intel) | `RenderMapperPro-macOS-intel.zip` |
            | Windows (x64) | `RenderMapperPro-Windows-x64.zip` |

            **macOS:** unzip, then right-click the app → **Open** → **Open** (first launch only, since it isn't notarized).
            **Windows:** unzip the folder, run **Render Mapper Pro.exe**. If SmartScreen warns, click **More info → Run anyway**.

            _The macOS-Intel zip attaches automatically once its build finishes (it can lag if GitHub's Intel runners are busy)._

  # Attach the Intel zip to the same Release whenever its build finishes.
  release-intel:
    name: Attach Intel build to release
    needs: [build-intel, release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: RenderMapperPro-macOS-intel
          path: artifacts
      - name: Upload Intel zip to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/RenderMapperPro-macOS-intel.zip
